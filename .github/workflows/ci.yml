name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  syntax:
    name: bash -n (parse)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse every shell file
        run: |
          set -e
          for f in bootstrap.sh install.sh uninstall.sh toglit tests/*.sh; do
            echo "checking $f"
            bash -n "$f"
          done

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: '.'
          additional_files: 'toglit'
          ignore_paths: 'icons'

  tests:
    name: helper tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: bash tests/test.sh
