<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="a" x1="32" x2="32" y1="58" y2="6" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7957c2"/>
      <stop offset=".3" stop-color="#9d7cd8"/>
      <stop offset="1" stop-color="#d4bfff"/>
    </linearGradient>
    <linearGradient id="b" x1="32" x2="32" y1="48" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9d7cd8"/>
      <stop offset="1" stop-color="#d4bfff"/>
    </linearGradient>
    <linearGradient id="c" x1="32" x2="32" y1="48" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#241845"/>
      <stop offset="1" stop-color="#3d2a6b"/>
    </linearGradient>
    <linearGradient id="d" x1="32" x2="32" y1="20" y2="6" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#bb9af7"/>
      <stop offset="1" stop-color="#d4bfff"/>
    </linearGradient>
    <linearGradient id="e" x1="32" x2="32" y1="58" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7957c2"/>
      <stop offset="1" stop-color="#bb9af7"/>
    </linearGradient>
    <radialGradient id="f" cx="32" cy="38" r="14" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d4bfff" stop-opacity=".25"/>
      <stop offset="1" stop-color="#7957c2" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g fill-rule="evenodd">
    <!-- Body - rounded rectangle background matching gaming icon shape feel -->
    <rect x="6" y="6" width="52" height="52" rx="14" fill="#1a1030"/>
    <rect x="7" y="7" width="50" height="50" rx="13" fill="#2d1f4e" opacity=".5"/>

    <!-- Touch ripple rings -->
    <circle cx="32" cy="40" r="18" fill="none" stroke="#9d7cd8" stroke-width="1.2" opacity=".2"/>
    <circle cx="32" cy="40" r="12" fill="none" stroke="#bb9af7" stroke-width="1.4" opacity=".3"/>
    <circle cx="32" cy="40" r="6" fill="none" stroke="#d4bfff" stroke-width="1.5" opacity=".4"/>

    <!-- Touch point glow -->
    <circle cx="32" cy="40" r="8" fill="url(#f)"/>
    <circle cx="32" cy="40" r="2.5" fill="#d4bfff" opacity=".6"/>

    <!-- Index finger - main, touching the point -->
    <rect x="28.5" y="10" width="7" height="28" rx="3.5" fill="url(#a)"/>
    <!-- Finger highlight -->
    <rect x="30" y="11" width="2.5" height="20" rx="1.25" fill="#d4bfff" opacity=".25"/>

    <!-- Middle finger -->
    <rect x="36.5" y="14" width="6.5" height="22" rx="3.25" fill="url(#a)" opacity=".7"/>
    <rect x="37.8" y="15" width="2" height="15" rx="1" fill="#d4bfff" opacity=".15"/>

    <!-- Ring finger -->
    <rect x="43.5" y="18" width="6" height="18" rx="3" fill="url(#a)" opacity=".45"/>

    <!-- Thumb -->
    <rect x="16" y="20" width="6.5" height="14" rx="3.25" fill="url(#a)" opacity=".55" transform="rotate(20 19.25 27)"/>

    <!-- Palm connection -->
    <path d="M22 34 Q26 40 28.5 36" fill="none" stroke="#9d7cd8" stroke-width="1.2" opacity=".3" stroke-linecap="round"/>
    <path d="M35.5 36 Q40 40 43.5 36" fill="none" stroke="#9d7cd8" stroke-width="1.2" opacity=".3" stroke-linecap="round"/>

    <!-- Toggle indicator arrows at bottom -->
    <path d="M12 54 l3.5-2.5 v5z" fill="#bb9af7" opacity=".6"/>
    <line x1="15.5" y1="54" x2="24" y2="54" stroke="#bb9af7" stroke-width="1.3" opacity=".6" stroke-linecap="round"/>
    <path d="M52 54 l-3.5-2.5 v5z" fill="#bb9af7" opacity=".6"/>
    <line x1="48.5" y1="54" x2="40" y2="54" stroke="#bb9af7" stroke-width="1.3" opacity=".6" stroke-linecap="round"/>
    <circle cx="32" cy="54" r="1.5" fill="#d4bfff" opacity=".7"/>

    <!-- Subtle bottom shadow like gaming icon -->
    <rect x="8" y="50" width="48" height="6" rx="3" fill="#2d1f4e" opacity=".15"/>
  </g>
</svg>
